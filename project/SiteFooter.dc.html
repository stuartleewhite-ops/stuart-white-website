<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet" />
</helmet>
<footer style="background:#0A0A0A;border-top:1px solid #1A1A1A;padding:56px clamp(20px,5vw,64px) 40px;font-family:'Montserrat',sans-serif;">
  <div style="max-width:1180px;margin:0 auto;display:flex;flex-wrap:wrap;gap:40px;justify-content:space-between;align-items:flex-start;">
    <div style="display:flex;flex-direction:column;gap:18px;">
      <a href="home.dc.html" aria-label="Stuart White home">
        <!-- TODO: swap for final wordmark-only logo file when supplied -->
        <img src="assets/sw-wordmark-white.png" alt="STUARTWHITE" width="150" height="34" style="height:22px;width:auto;display:block;" />
      </a>
      <a href="{{ mailto }}" style="font-size:13px;color:#9A9A9A;">{{ email }}</a>
    </div>

    <nav aria-label="Footer" style="display:flex;flex-wrap:wrap;gap:40px;">
      <ul style="list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:12px;">
        <sc-for list="{{ primary }}" as="l" hint-placeholder-count="4">
          <li><a href="{{ l.href }}" style="font-size:12px;letter-spacing:0.04em;color:#9A9A9A;">{{ l.label }}</a></li>
        </sc-for>
      </ul>
      <ul style="list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:12px;">
        <li><a href="client-login.dc.html" style="font-size:12px;letter-spacing:0.04em;color:#9A9A9A;">Client login</a></li>
        <li><a href="newsletter.dc.html" style="font-size:12px;letter-spacing:0.04em;color:#9A9A9A;">Newsletter</a></li>
        <li><a href="book-a-call.dc.html" style="font-size:12px;letter-spacing:0.04em;color:#9A9A9A;">Book a free call</a></li>
      </ul>
    </nav>
  </div>

  <div style="max-width:1180px;margin:44px auto 0;padding-top:22px;border-top:1px solid #1A1A1A;display:flex;flex-wrap:wrap;gap:10px;justify-content:space-between;">
    <span style="font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:#6B6B6B;">Fitness · Nutrition · Sleep</span>
    <span style="font-size:12px;color:#6B6B6B;">© {{ year }} Stuart White</span>
  </div>
</footer>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1180,&quot;height&quot;:260}}">
class Component extends DCLogic {
  componentDidMount() {
    if (!window.SW_CONFIG) {
      this._t = setInterval(() => { if (window.SW_CONFIG) { clearInterval(this._t); this.forceUpdate(); } }, 50);
    }
  }
  componentWillUnmount() { if (this._t) clearInterval(this._t); }
  renderVals() {
    const cfg = window.SW_CONFIG || { nav: [], email: '', year: 2026 };
    return {
      primary: cfg.nav || [],
      email: cfg.email,
      mailto: 'mailto:' + (cfg.email || ''),
      year: cfg.year,
    };
  }
}
</script>
</body>
</html>
